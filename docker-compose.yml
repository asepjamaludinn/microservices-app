version: "3.8"

services:
  # 1. Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
    container_name: frontend-app
    ports:
      - "8000:3000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:80
      - PROJECT_SERVICE_URL=http://project-service:80
      - NODE_ENV=production
    depends_on:
      - auth-service
      - project-service
    networks:
      - microservices-network

  # 2. Auth Service
  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "8001:80"
    env_file:
      - ./auth-service/.env
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=user-db
      - DB_PORT=5432
      - DB_DATABASE=user_db
      - DB_USERNAME=admin
      - DB_PASSWORD=root_password
      - ADMIN_EMAIL=admin@bitebox.com
      - ADMIN_PASSWORD=sayaakanlawan
    depends_on:
      - user-db
    networks:
      - microservices-network

  # 3. Project Service
  project-service:
    build:
      context: ./project-service
    container_name: project-service
    ports:
      - "8002:80"
    env_file:
      - ./project-service/.env
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=project-db
      - DB_PORT=5432
      - DB_DATABASE=project_db
      - DB_USERNAME=admin
      - DB_PASSWORD=root_password
    depends_on:
      - project-db
    networks:
      - microservices-network

  # 4. Database untuk Auth Service
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root_password
      POSTGRES_DB: user_db
    ports:
      - "54321:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - microservices-network

  # 5. Database untuk Project Service
  project-db:
    image: postgres:15-alpine
    container_name: project-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root_password
      POSTGRES_DB: project_db
    ports:
      - "54322:5432"
    volumes:
      - project-db-data:/var/lib/postgresql/data
    networks:
      - microservices-network

volumes:
  user-db-data:
  project-db-data:

networks:
  microservices-network:
    driver: bridge
